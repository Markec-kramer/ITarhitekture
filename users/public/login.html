<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prijava</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">Rental Portal</div>
    <nav class="nav-links">
      <a href="/index.html">Domov</a>
      <a href="/login.html">Prijava</a>
      <a href="/register.html" class="btn-primary">Registracija</a>
    </nav>
  </header>

  <main class="form-page">
    <div class="form-card">
      <h1>Prijava</h1>
      <form id="loginForm">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" name="email" placeholder="Vnesi email" required />

        <label for="loginPassword">Geslo</label>
        <input type="password" id="loginPassword" name="password" placeholder="Vnesi geslo" required />

        <button type="submit" class="btn-primary full-width">Prijava</button>
      </form>

      <p id="loginMessage" class="message"></p>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
