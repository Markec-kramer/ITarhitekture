<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registracija</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">Rental Portal</div>
    <nav class="nav-links">
      <a href="/index.html">Domov</a>
      <a href="/login.html">Prijava</a>
      <a href="/register.html" class="btn-primary">Registracija</a>
    </nav>
  </header>

  <main class="form-page">
    <div class="form-card">
      <h1>Registracija</h1>
      <form id="registerForm">
        <label for="name">Ime in priimek</label>
        <input type="text" id="name" name="name" placeholder="Vnesi ime in priimek" required />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Vnesi email" required />

        <label for="password">Geslo</label>
        <input type="password" id="password" name="password" placeholder="Vnesi geslo" required />

        <button type="submit" class="btn-primary full-width">Registracija</button>
      </form>

      <p id="registerMessage" class="message"></p>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
